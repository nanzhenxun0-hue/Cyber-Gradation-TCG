<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-GRADATION TCG</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header class="battle-header">
            <div class="hp-gauge enemy">
                <div id="enemy-hp-bar" class="bar" style="width: 100%;"></div>
                <span id="enemy-hp-text" class="hp-label">HP: 50</span>
            </div>
            <div id="enemy-slots" class="unit-slots">
                <div class="slot enemy-slot" data-index="0"></div>
                <div class="slot enemy-slot" data-index="1"></div>
                <div class="slot enemy-slot" data-index="2"></div>
            </div>
        </header>

        <main class="center-lane">
            <div id="phase-display" class="glitch-text">SYSTEM INITIALIZED</div>
            <div id="log-console">
                <div class="log-entry">> Sector Selection Required...</div>
            </div>
        </main>

        <footer class="battle-footer">
            <div id="player-slots" class="unit-slots">
                <div class="slot player-slot" data-index="0"></div>
                <div class="slot player-slot" data-index="1"></div>
                <div class="slot player-slot" data-index="2"></div>
            </div>
            
            <div class="hp-gauge player">
                <div id="player-hp-bar" class="bar" style="width: 100%;"></div>
                <span id="player-hp-text" class="hp-label">HP: 50</span>
            </div>

            <div id="player-hand" class="hand-container">
                </div>
        </footer>

        <div id="overlay" class="overlay-screen hidden">
            <div id="modal-content" class="modal-body">
                </div>
        </div>
        
        <div id="splash-screen" class="splash">
            <h1 class="logo-text">CYBER-GRADATION</h1>
            <div class="loader"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

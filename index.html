<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-GRADATION TCG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header class="battle-header">
            <div class="hp-gauge enemy">
                <div id="enemy-hp-bar" class="bar"></div>
                <span id="enemy-hp-text">HP: 50</span>
            </div>
            <div id="enemy-slots" class="unit-slots">
                <div class="slot" data-index="0"></div>
                <div class="slot" data-index="1"></div>
                <div class="slot" data-index="2"></div>
            </div>
        </header>

        <main class="center-lane">
            <div id="phase-display">MAIN PHASE</div>
            <div id="log-console">System Booting...</div>
        </main>

        <footer class="battle-footer">
            <div id="player-slots" class="unit-slots">
                <div class="slot" data-index="0"></div>
                <div class="slot" data-index="1"></div>
                <div class="slot" data-index="2"></div>
            </div>
            <div class="hp-gauge player">
                <div id="player-hp-bar" class="bar"></div>
                <span id="player-hp-text">HP: 50</span>
            </div>
            <div id="player-hand" class="hand-container">
                </div>
        </footer>

        <div id="overlay" class="hidden">
            <div id="modal-content"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
